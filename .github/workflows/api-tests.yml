name: API Tests (Zenith HR)

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      TEST_ENV:
        description: 'Environment to run against'
        type: choice
        options: [dev, staging, prod]
        default: staging

env:
  TEST_ENV: ${{ github.event.inputs.TEST_ENV || 'staging' }}

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4        # Allure CLI needs Java
        with:
          distribution: temurin
          java-version: '17'

      - run: npm ci
      # NOTE: no `playwright install` — these are pure API tests (request context,
      # no browser), so we skip browser downloads and the run is fast.

      - name: Run API tests (skip @ui-verify so CI doesn't leave demo data)
        run: npx playwright test --config playwright.zenith-api.config.ts --grep-invert "@ui-verify"

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report (downloadable)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report/
          retention-days: 14
