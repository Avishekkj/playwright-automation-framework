name: Zenith HR UI Tests

on:
  push:
  pull_request:            # also run on PRs (the standard "gate" before merge)
  workflow_dispatch:
    inputs:
      TEST_ENV:
        description: 'Environment to run against'
        type: choice
        options: [dev, staging, prod]
        default: staging

permissions:
  contents: write            # report job publishes to gh-pages

env:
  TEST_ENV: ${{ github.event.inputs.TEST_ENV || 'staging' }}

jobs:
  # ── TEST: 3 browsers × 2 shards = 6 parallel runners ──
  # (2 shards, not 4 — keeps concurrent load on the shared demo site manageable)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run ${{ matrix.browser }} shard ${{ matrix.shard }} (env=${{ env.TEST_ENV }})
        run: npx playwright test --config playwright.zenith.ci.config.ts --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: allure-results/
          retention-days: 1

  # ── REPORT: merge the 3-browser × 2-shard results into one Allure report ──
  # NOTE: this is the detailed CROSS-BROWSER UI report, published as a downloadable
  # artifact only. The single shareable GitHub Pages site (API · UI · E2E, all in
  # one place) is owned by .github/workflows/full-report.yml — only ONE workflow
  # publishes to gh-pages so they never clash.
  report:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4        # Allure CLI needs Java
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci

      - name: Download all allure-results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload cross-browser Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-cross-browser
          path: allure-report/
          retention-days: 14
