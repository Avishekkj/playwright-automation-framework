name: Zenith HR UI Tests

on:
  push:
  workflow_dispatch:
    inputs:
      TEST_ENV:
        description: 'Environment to run against'
        type: choice
        options: [dev, staging, prod]
        default: staging

permissions:
  contents: write            # report job publishes to gh-pages

env:
  TEST_ENV: ${{ github.event.inputs.TEST_ENV || 'staging' }}

jobs:
  # ── TEST: 3 browsers × 2 shards = 6 parallel runners ──
  # (2 shards, not 4 — keeps concurrent load on the shared demo site manageable)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run ${{ matrix.browser }} shard ${{ matrix.shard }} (env=${{ env.TEST_ENV }})
        run: npx playwright test --config playwright.zenith.ci.config.ts --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: allure-results/
          retention-days: 1

  # ── REPORT: merge results → Allure (with history) → publish to Pages + artifact ──
  report:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4        # Allure CLI needs Java
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci

      - name: Download all allure-results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Load previous history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore history so trends accumulate
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/ || true
          fi

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Publish to GitHub Pages (shareable link)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14
