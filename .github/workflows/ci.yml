name: API Tests

# Manual-only: the API suite needs a GOREST_TOKEN secret. Run it from the
# Actions tab (or add the secret and re-enable push) — kept off auto-run so it
# doesn't fail on every push.
on:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run API tests
        env:
          GOREST_TOKEN: ${{ secrets.GOREST_TOKEN }} # stored as a GitHub secret, never in code
        run: npm test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Publish JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results/junit.xml
          retention-days: 7
