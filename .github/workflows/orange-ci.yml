name: OrangeHRM UI Tests

# run on every push, and allow manual runs from the Actions tab
on:
  push:
  workflow_dispatch:

jobs:
  # ── TEST JOB: 2-D matrix = 3 browsers × 4 shards = 12 parallel runners ──
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # one failing job doesn't stop the others
      matrix:
        browser: [chromium, firefox, webkit]   # cross-browser
        shard: [1, 2, 3, 4]                     # sharded within each browser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      # install ONLY this job's browser (faster than installing all three everywhere)
      - run: npx playwright install --with-deps ${{ matrix.browser }}

      # run this browser's slice of the suite (using the dedicated CI config)
      - name: Run ${{ matrix.browser }} shard ${{ matrix.shard }}
        run: npx playwright test --config playwright.orange.ci.config.ts --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/4

      # unique artifact name per browser+shard so the merge job can collect them all
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # ── MERGE JOB: combine the 4 blob reports into ONE HTML report ──
  merge-report:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # pull down all 4 shards' blob reports into one folder
      - uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: playwright-report/
          retention-days: 7
